<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AVA — Joyería</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', sans-serif;
  background: #ffffff;
  color: #111;
}

/* HEADER */
header {
  padding: 50px 20px 10px;
  text-align: center;
  font-family: 'Playfair Display', serif;
  font-size: 32px;
  letter-spacing: 10px;
}

/* NAV */
nav {
  display: flex;
  justify-content: center;
  gap: 25px;
  font-size: 13px;
  margin-bottom: 50px;
}

nav a {
  text-decoration: none;
  color: #777;
}

nav a:hover {
  color: #000;
}

/* HERO */
.hero {
  text-align: center;
  padding: 100px 20px;
}

.hero p {
  max-width: 600px;
  margin: auto;
  font-family: 'Playfair Display', serif;
  font-size: 24px;
  line-height: 1.6;
}

/* SECTION */
.section {
  padding: 60px 20px;
  text-align: center;
}

.section h2 {
  font-family: 'Playfair Display', serif;
  margin-bottom: 40px;
  font-size: 24px;
}

/* PRODUCTOS */
.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 40px;
  max-width: 1000px;
  margin: auto;
}

.card {
  text-align: center;
}

/* IMÁGENES */
.card img {
  width: 100%;
  aspect-ratio: 1/1;
  object-fit: cover;
  border-radius: 18px;
  margin-bottom: 15px;
  transition: transform 0.3s ease;
}

.card img:hover {
  transform: scale(1.03);
}

/* TEXTO */
.card h3 {
  font-weight: 400;
  font-size: 16px;
  margin-bottom: 5px;
}

.card p {
  font-size: 13px;
  color: #777;
}

/* BOTÓN */
.btn {
  display: inline-block;
  margin-top: 10px;
  padding: 8px 18px;
  border: 1px solid #111;
  text-decoration: none;
  font-size: 12px;
  color: #111;
  transition: 0.3s;
}

.btn:hover {
  background: #111;
  color: white;
}

/* INSTAGRAM */
.instagram {
  margin-top: 80px;
}

.instagram a {
  text-decoration: none;
  color: #111;
  border-bottom: 1px solid #111;
}

/* FOOTER */
footer {
  margin-top: 60px;
  padding: 30px;
  text-align: center;
  font-size: 12px;
  color: #aaa;
}
</style>
</head>

<body>

<header>AVA</header>

<nav>
  <a href="#">Inicio</a>
  <a href="#">Colección</a>
  <a href="#">Contacto</a>
</nav>

<section class="hero">
  <p>
    Para quienes saben que los detalles definen el carácter; 
    cada pieza, una historia por contar.
  </p>
</section>

<section class="section">
  <h2>Colección</h2>

  <div class="products">

    <div class="card">
      <img src="imagenes/aros1.jpg">
      <h3>Aros Aura</h3>
      <p>Acero quirúrgico</p>
      <a href="https://wa.me/543456257273" class="btn">Consultar</a>
    </div>

    <div class="card">
      <img src="imagenes/anillo1.jpg">
      <h3>Anillo Nova</h3>
      <p>Minimalista</p>
      <a href="https://wa.me/543456257273" class="btn">Consultar</a>
    </div>

    <div class="card">
      <img src="imagenes/collar1.jpg">
      <h3>Collar Sol</h3>
      <p>Baño dorado</p>
      <a href="https://wa.me/543456257273" class="btn">Consultar</a>
    </div>

  </div>
</section>

<section class="instagram">
  <p>
    Seguinos en 
    <a href="https://instagram.com/AVA.jewels_">@AVA.jewels_</a>
  </p>
</section>

<footer>
  © 2026 AVA
</footer>

</body>
</html>
